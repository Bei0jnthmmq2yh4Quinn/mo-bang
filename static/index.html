<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>墨榜 - 爆款拆解与脚本改写工具</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #111827 0%, #1f2937 40%, #312e81 100%); min-height: 100vh; }
    .glass { background: rgba(255,255,255,.95); backdrop-filter: blur(10px); }
    .tab-btn.active { background: #111827; color: #fff; }
    textarea { resize: vertical; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  </style>
</head>
<body class="p-4 md:p-8 text-gray-900">
  <div class="max-w-6xl mx-auto">
    <div class="text-center mb-8 text-white">
      <div class="inline-block px-4 py-1 rounded-full bg-white/10 text-sm mb-4">爆款拆解 → 改脚本 → 变成自己的内容</div>
      <h1 class="text-4xl md:text-5xl font-bold">墨榜</h1>
      <p class="mt-3 text-white/80">面向外部用户的爆款内容拆解与脚本改写工具</p>
    </div>

    <div class="glass rounded-2xl shadow-2xl p-4 md:p-6 mb-6">
      <div class="flex flex-wrap gap-3 mb-6">
        <button class="tab-btn active px-4 py-2 rounded-xl border" data-tab="mobang" onclick="showTab('mobang', this)">📝 拆脚本</button>
        <button class="tab-btn px-4 py-2 rounded-xl border" data-tab="trends" onclick="showTab('trends', this)">🔥 热点查询</button>
        <button class="tab-btn px-4 py-2 rounded-xl border" data-tab="analysis" onclick="showTab('analysis', this)">📊 对标分析</button>
        <button class="tab-btn px-4 py-2 rounded-xl border" data-tab="topics" onclick="showTab('topics', this)">💡 AI 选题</button>
      </div>

      <section id="mobang" class="tab-panel">
        <div class="grid lg:grid-cols-2 gap-6">
          <div class="space-y-4">
            <div>
              <label class="block font-semibold mb-2">爆款内容输入</label>
              <textarea id="sourceText" class="w-full border rounded-xl p-4 min-h-[220px]" placeholder="贴入爆款文案、视频字幕，或先把抖音内容整理成文本再丢进来。"></textarea>
            </div>
            <div>
              <label class="block font-semibold mb-2">抖音链接（占位）</label>
              <input id="sourceUrl" class="w-full border rounded-xl p-3" placeholder="https://v.douyin.com/...（当前优先把文本工作流做实）" />
            </div>
            <div>
              <label class="block font-semibold mb-2">改写模式</label>
              <div class="grid grid-cols-2 md:grid-cols-3 gap-2 text-sm">
                <label class="border rounded-xl p-3"><input type="radio" name="rewriteMode" value="douyin" checked> 抖音版</label>
                <label class="border rounded-xl p-3"><input type="radio" name="rewriteMode" value="xiaohongshu"> 小红书版</label>
                <label class="border rounded-xl p-3"><input type="radio" name="rewriteMode" value="spoken"> 口播版</label>
                <label class="border rounded-xl p-3"><input type="radio" name="rewriteMode" value="lead"> 接单版</label>
                <label class="border rounded-xl p-3"><input type="radio" name="rewriteMode" value="opinion"> 观点版</label>
              </div>
            </div>
            <div class="flex flex-wrap gap-3">
              <button onclick="analyzeScript()" class="bg-indigo-600 text-white px-5 py-3 rounded-xl hover:bg-indigo-700">拆解脚本</button>
              <button onclick="rewriteScript()" class="bg-emerald-600 text-white px-5 py-3 rounded-xl hover:bg-emerald-700">改写脚本</button>
              <button onclick="copyResult('rewriteResult')" class="bg-gray-900 text-white px-5 py-3 rounded-xl hover:bg-black">复制改写结果</button>
            </div>
            <div id="mobangStatus" class="text-sm text-gray-500"></div>
          </div>

          <div class="space-y-4">
            <div class="border rounded-2xl p-4 bg-gray-50">
              <div class="font-semibold mb-3">结构化拆解</div>
              <div id="analyzeResult" class="space-y-3 text-sm text-gray-700">
                <div class="text-gray-400">还没开始，先点“拆解脚本”。</div>
              </div>
            </div>
            <div class="border rounded-2xl p-4 bg-gray-50">
              <div class="font-semibold mb-3">改写成稿</div>
              <div id="rewriteResult" class="space-y-3 text-sm text-gray-700">
                <div class="text-gray-400">还没开始，先点“改写脚本”。</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="trends" class="tab-panel hidden">
        <h2 class="text-xl font-bold mb-4">🔥 热点查询</h2>
        <div class="flex gap-2 mb-4">
          <button onclick="getDouyin()" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">抖音</button>
          <button onclick="getXiaohongshu()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">小红书</button>
        </div>
        <div id="trendsResult" class="space-y-2"></div>
      </section>

      <section id="analysis" class="tab-panel hidden">
        <h2 class="text-xl font-bold mb-4">📊 对标分析</h2>
        <div class="flex gap-2 mb-4 flex-wrap">
          <input id="username" placeholder="输入账号名" class="border rounded-lg px-4 py-2 flex-1 min-w-32">
          <select id="platform" class="border rounded-lg px-4 py-2">
            <option value="douyin">抖音</option>
            <option value="xiaohongshu">小红书</option>
          </select>
          <button onclick="analyzeBenchmark()" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">分析</button>
        </div>
        <div id="analysisResult" class="space-y-2"></div>
      </section>

      <section id="topics" class="tab-panel hidden">
        <h2 class="text-xl font-bold mb-4">💡 AI 生成选题</h2>
        <div class="space-y-3 mb-4">
          <input id="niche" placeholder="领域（如：职场、美食、健身）" class="border rounded-lg px-4 py-2 w-full">
          <input id="benchmarkTopics" placeholder="对标选题（逗号分隔）" class="border rounded-lg px-4 py-2 w-full">
          <input id="trendsInput" placeholder="热点话题（逗号分隔）" class="border rounded-lg px-4 py-2 w-full">
          <button onclick="generateTopics()" class="bg-purple-500 text-white px-4 py-2 rounded-lg hover:bg-purple-600 w-full">生成选题</button>
        </div>
        <div id="topicsResult" class="space-y-2"></div>
      </section>
    </div>
  </div>

  <script>
    const API = '/api';

    function showTab(tab, btn) {
      document.querySelectorAll('.tab-panel').forEach(el => el.classList.add('hidden'));
      document.getElementById(tab).classList.remove('hidden');
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      if (btn) btn.classList.add('active');
    }

    function escapeHtml(str='') {
      return str.replace(/[&<>\"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }

    async function analyzeScript() {
      const text = document.getElementById('sourceText').value.trim();
      const url = document.getElementById('sourceUrl').value.trim();
      document.getElementById('mobangStatus').textContent = '正在拆解...';
      const res = await fetch(API + '/mobang/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text, url })
      });
      const data = await res.json();
      document.getElementById('mobangStatus').textContent = data.message || '';
      if (!data.success) {
        document.getElementById('analyzeResult').innerHTML = `<div class="text-red-500">${escapeHtml(data.message || '拆解失败')}</div>`;
        return;
      }
      const d = data.data;
      document.getElementById('analyzeResult').innerHTML = `
        <div class="grid md:grid-cols-2 gap-3">
          <div class="border rounded-xl p-3"><div class="text-xs text-gray-500 mb-1">Hook</div><div>${escapeHtml(d.hook || '')}</div></div>
          <div class="border rounded-xl p-3"><div class="text-xs text-gray-500 mb-1">核心话题</div><div>${escapeHtml(d.topic || '')}</div></div>
          <div class="border rounded-xl p-3"><div class="text-xs text-gray-500 mb-1">情绪点</div><div>${escapeHtml(d.emotion || '')}</div></div>
          <div class="border rounded-xl p-3"><div class="text-xs text-gray-500 mb-1">CTA</div><div>${escapeHtml(d.cta || '')}</div></div>
        </div>
        <div class="border rounded-xl p-3"><div class="text-xs text-gray-500 mb-1">内容结构</div><div class="mono whitespace-pre-wrap">${escapeHtml((d.structure || []).join('\n'))}</div></div>
        <div class="border rounded-xl p-3"><div class="text-xs text-gray-500 mb-1">爆点原因</div><div>${escapeHtml(d.why_it_works || '')}</div></div>
      `;
    }

    async function rewriteScript() {
      const text = document.getElementById('sourceText').value.trim();
      const url = document.getElementById('sourceUrl').value.trim();
      const mode = document.querySelector('input[name="rewriteMode"]:checked').value;
      document.getElementById('mobangStatus').textContent = '正在改写...';
      const res = await fetch(API + '/mobang/rewrite', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text, url, mode })
      });
      const data = await res.json();
      document.getElementById('mobangStatus').textContent = data.message || '';
      if (!data.success) {
        document.getElementById('rewriteResult').innerHTML = `<div class="text-red-500">${escapeHtml(data.message || '改写失败')}</div>`;
        return;
      }
      const d = data.data;
      document.getElementById('rewriteResult').innerHTML = `
        <div class="border rounded-xl p-3 bg-white">
          <div class="flex justify-between items-center mb-2">
            <div class="font-semibold">${escapeHtml(d.title || '')}</div>
            <span class="text-xs px-2 py-1 rounded bg-emerald-100 text-emerald-700">${escapeHtml(d.mode || '')}</span>
          </div>
          <div class="text-sm text-gray-600 mb-2">${escapeHtml(d.summary || '')}</div>
          <div class="mono whitespace-pre-wrap text-sm leading-6">${escapeHtml(d.script || '')}</div>
        </div>
      `;
    }

    function copyResult(id) {
      const text = document.getElementById(id).innerText.trim();
      if (!text) return;
      navigator.clipboard.writeText(text);
      document.getElementById('mobangStatus').textContent = '已复制到剪贴板';
    }

    async function getDouyin() {
      const res = await fetch(API + '/trends/douyin');
      const data = await res.json();
      document.getElementById('trendsResult').innerHTML = (data.data || []).map(t =>
        `<div class="flex justify-between p-3 bg-gray-50 rounded"><span>#${t.rank} ${escapeHtml(t.title || '')}</span><span class="text-gray-500">${Number(t.hot || 0).toLocaleString()}</span></div>`
      ).join('') || '<div class="text-gray-400">暂无数据</div>';
    }

    async function getXiaohongshu() {
      const res = await fetch(API + '/trends/xiaohongshu');
      const data = await res.json();
      document.getElementById('trendsResult').innerHTML = (data.data || []).map(t =>
        `<div class="flex justify-between p-3 bg-gray-50 rounded"><span>#${t.rank} ${escapeHtml(t.title || '')}</span><span class="text-gray-500">${Number(t.likes || 0).toLocaleString()} 赞</span></div>`
      ).join('') || '<div class="text-gray-400">暂无数据</div>';
    }

    async function analyzeBenchmark() {
      const username = document.getElementById('username').value;
      const platform = document.getElementById('platform').value;
      const res = await fetch(API + '/analysis/benchmark', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username, platform })
      });
      const data = await res.json();
      const d = data.data || {};
      document.getElementById('analysisResult').innerHTML = `
        <div class="p-4 bg-gray-50 rounded">
          <div class="font-bold text-lg">@${escapeHtml(d.username || '')}</div>
          <div class="text-gray-600">${escapeHtml(d.platform || '')} | 粉丝: ${Number(d.followers || 0).toLocaleString()} | 赞: ${Number(d.avg_likes || 0).toLocaleString()}</div>
          <div class="mt-2"><span class="bg-purple-100 text-purple-700 px-2 py-1 rounded">${escapeHtml(d.content_style || '')}</span></div>
          <div class="mt-2 text-sm text-gray-500">话题: ${escapeHtml((d.topics || []).join(', '))}</div>
        </div>`;
    }

    async function generateTopics() {
      const niche = document.getElementById('niche').value;
      const benchmarkTopics = document.getElementById('benchmarkTopics').value.split(',').map(s => s.trim()).filter(Boolean);
      const trends = document.getElementById('trendsInput').value.split(',').map(s => s.trim()).filter(Boolean);
      const res = await fetch(API + '/topics/generate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ niche, benchmark_topics: benchmarkTopics, trends })
      });
      const data = await res.json();
      document.getElementById('topicsResult').innerHTML = (data.data || []).map(t =>
        `<div class="p-3 bg-gray-50 rounded space-y-1">
          <div class="flex justify-between items-center">
            <span class="font-semibold">${escapeHtml(t.title || '')}</span>
            <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">${escapeHtml(t.type || '')}</span>
          </div>
          <div class="text-sm text-gray-600">角度：${escapeHtml(t.angle || '')} | 形式：${escapeHtml(t.format || '')}</div>
          <div class="text-sm text-gray-500">Hook：${escapeHtml(t.hook || '')}</div>
          <div class="text-xs text-gray-500">要点：${escapeHtml((t.points || []).join(' / '))}</div>
          <div class="text-xs text-blue-600">${escapeHtml((t.hashtags || []).join(' '))}</div>
        </div>`
      ).join('') || '<div class="text-gray-400">暂无结果</div>';
    }
  </script>
</body>
</html>
